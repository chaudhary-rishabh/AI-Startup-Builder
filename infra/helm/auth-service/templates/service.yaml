apiVersion: v1
kind: Service
metadata:
  name: {{ include "svc.name" . }}
  labels:
    {{- include "svc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "svc.name" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
