apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-gateway-secrets
  namespace: user-services
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: api-gateway-runtime
    creationPolicy: Owner
  data:
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: aistartup-dev/jwt-keys
        property: publicKey
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: aistartup-dev/jwt-keys
        property: privateKey
    - secretKey: DATABASE_URL
      remoteRef:
        key: aistartup-dev/db-credentials
        property: url
