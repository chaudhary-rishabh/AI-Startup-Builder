apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: user-services
  labels:
    app.kubernetes.io/name: billing-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: billing-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: billing-service
          image: ${ECR_REGISTRY}/billing-service:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: billing-service-config
            - secretRef:
                name: billing-service-runtime
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
