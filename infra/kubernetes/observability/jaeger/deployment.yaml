apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57.0
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: http-query
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: infra
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: http-query
      port: 16686
      targetPort: http-query
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
