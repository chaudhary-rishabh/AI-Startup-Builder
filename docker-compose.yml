version: "3.9"

networks:
  ai-startup-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  # ─────────────────────────────────────────────────────────────────
  # DATA LAYER
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai-startup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aistartup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-startup-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aistartup"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-startup-redis
    restart: unless-stopped
    command: redis-server --requirepass devpassword --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - ai-startup-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: ai-startup-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: ai-startup-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: ai-startup-user-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  project-service:
    build:
      context: ./services/project-service
      dockerfile: Dockerfile
    container_name: ai-startup-project-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: ai-startup-ai-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  rag-service:
    build:
      context: ./services/rag-service
      dockerfile: Dockerfile
    container_name: ai-startup-rag-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  billing-service:
    build:
      context: ./services/billing-service
      dockerfile: Dockerfile
    container_name: ai-startup-billing-service
    restart: unless-stopped
    ports:
      - "4006:4006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: ai-startup-notification-service
    restart: unless-stopped
    ports:
      - "4007:4007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: ai-startup-analytics-service
    restart: unless-stopped
    ports:
      - "4008:4008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    networks:
      - ai-startup-network

  # ─────────────────────────────────────────────────────────────────
  # OBSERVABILITY STACK
  # ─────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ai-startup-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - ai-startup-network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ai-startup-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - ai-startup-network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: ai-startup-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: devpassword
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - ai-startup-network
