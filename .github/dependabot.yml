version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /services
    schedule:
      interval: weekly

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
